<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thananon Badminton Night</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;800;900&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Kanit',sans-serif;background:#020f07;color:#f0f8e8;overflow-x:hidden}
#bg-canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
.app{position:relative;z-index:2;padding:20px 16px 40px;max-width:480px;margin:0 auto}
.badge{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(223,255,154,0.2);border-radius:50px;padding:4px 14px;font-size:11px;color:rgba(223,255,154,0.55);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;background:rgba(223,255,154,0.04)}
.dot{width:6px;height:6px;background:#c8ff4d;border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
h1{font-size:clamp(22px,6vw,36px);font-weight:900;line-height:1.1;background:linear-gradient(135deg,#fff 0%,#DFFF9A 55%,#7dbd1e 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.loc-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.loc-display{display:flex;align-items:center;gap:6px;background:rgba(223,255,154,0.05);border:1px solid rgba(223,255,154,0.15);border-radius:10px;padding:7px 12px;font-size:13px;color:rgba(223,255,154,0.7);font-family:'Sarabun',sans-serif;flex:1;min-width:0}
.loc-display .pin{font-size:15px;flex-shrink:0}
.time-badge{display:flex;align-items:center;gap:5px;background:rgba(223,255,154,0.04);border:1px solid rgba(223,255,154,0.1);border-radius:8px;padding:6px 10px;font-size:12px;color:rgba(223,255,154,0.5);font-family:'Sarabun',sans-serif;white-space:nowrap}
.sync-bar{display:flex;align-items:center;justify-content:space-between;background:rgba(0,255,100,0.05);border:1px solid rgba(0,255,100,0.12);border-radius:10px;padding:8px 14px;margin-bottom:14px;font-size:11px;font-family:'Sarabun',sans-serif}
.sync-left{display:flex;align-items:center;gap:6px;color:rgba(180,255,180,0.6)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#4dff88;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
.sync-right{color:rgba(223,255,154,0.35);font-size:10px;cursor:pointer;transition:color 0.2s}
.sync-right:hover{color:#DFFF9A}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.sc{background:rgba(223,255,154,0.04);border:1px solid rgba(223,255,154,0.1);border-radius:13px;padding:11px 7px;text-align:center}
.sn{font-size:22px;font-weight:800;color:#DFFF9A;text-shadow:0 0 10px rgba(223,255,154,0.35);line-height:1}
.sl{font-size:10px;color:rgba(223,255,154,0.4);margin-top:3px;font-family:'Sarabun',sans-serif}
.panel{background:rgba(223,255,154,0.04);border:1px solid rgba(223,255,154,0.12);border-radius:16px;padding:14px;margin-bottom:12px;position:relative;overflow:hidden}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(223,255,154,0.35),transparent)}
.plbl{font-size:10px;font-weight:700;color:rgba(223,255,154,0.4);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.court-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.court-row label{font-size:12px;color:rgba(223,255,154,0.55);white-space:nowrap;font-family:'Sarabun',sans-serif;min-width:64px}
.court-row input[type=number]{width:60px;background:rgba(0,0,0,0.4);border:1px solid rgba(223,255,154,0.15);border-radius:10px;padding:7px 10px;color:#DFFF9A;font-family:'Kanit',sans-serif;font-size:15px;font-weight:700;text-align:center;outline:none;-moz-appearance:textfield}
.court-row input[type=number]::-webkit-outer-spin-button,.court-row input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.court-row input[type=number]:focus{border-color:#DFFF9A}
.court-vis{display:flex;gap:4px;flex:1;flex-wrap:wrap}
.cv{height:24px;min-width:36px;flex:1;border-radius:5px;background:rgba(223,255,154,0.05);border:1px solid rgba(223,255,154,0.08);transition:all 0.35s;display:flex;align-items:center;justify-content:center;font-size:9px;color:rgba(223,255,154,0.3);font-family:'Sarabun',sans-serif}
.cv.on{background:linear-gradient(135deg,#4a8a00,#2d5800);border-color:rgba(125,189,30,0.5);box-shadow:0 0 6px rgba(125,189,30,0.3);color:#DFFF9A}
.cv.full{background:linear-gradient(135deg,#7dbd1e,#5a9a00);border-color:#7dbd1e;box-shadow:0 0 10px rgba(125,189,30,0.45);color:#013220;font-weight:700}
.cap-txt{font-size:10px;color:rgba(223,255,154,0.3);font-family:'Sarabun',sans-serif;margin-top:2px}
.sel-wrap{position:relative;margin-bottom:8px}
.sel-wrap::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#DFFF9A;pointer-events:none;font-size:13px}
select{width:100%;background:rgba(0,0,0,0.4);border:1px solid rgba(223,255,154,0.15);border-radius:11px;padding:11px 36px 11px 14px;color:#f0f8e8;font-family:'Kanit',sans-serif;font-size:14px;outline:none;appearance:none;transition:border-color 0.2s}
select:focus{border-color:#DFFF9A}
select option{background:#0a2010}
.divider{font-size:10px;color:rgba(223,255,154,0.25);text-align:center;margin:6px 0;letter-spacing:1px;font-family:'Sarabun',sans-serif}
.add-custom{display:flex;gap:7px;margin-bottom:10px}
.add-custom input{flex:1;background:rgba(0,0,0,0.4);border:1px solid rgba(223,255,154,0.12);border-radius:11px;padding:10px 14px;color:#f0f8e8;font-family:'Kanit',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s}
.add-custom input::placeholder{color:rgba(223,255,154,0.25)}
.add-custom input:focus{border-color:rgba(223,255,154,0.4)}
.add-custom button{padding:10px 14px;background:rgba(223,255,154,0.1);border:1px solid rgba(223,255,154,0.2);border-radius:11px;color:#DFFF9A;font-family:'Kanit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all 0.2s}
.add-custom button:hover{background:rgba(223,255,154,0.18)}
.join-btn{width:100%;padding:13px;background:linear-gradient(135deg,#c8ff4d 0%,#7dbd1e 100%);color:#013220;border:none;border-radius:11px;font-family:'Kanit',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px}
.join-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 5px 20px rgba(125,189,30,0.4)}
.join-btn:disabled{opacity:0.3;cursor:not-allowed}
.lh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.lt{font-size:10px;font-weight:700;color:rgba(223,255,154,0.4);letter-spacing:2px;text-transform:uppercase}
.rbtn{background:rgba(255,60,60,0.07);border:1px solid rgba(255,60,60,0.16);color:rgba(255,100,100,0.65);border-radius:7px;padding:4px 11px;font-family:'Kanit',sans-serif;font-size:11px;cursor:pointer;transition:all 0.2s}
.rbtn:hover{background:rgba(255,60,60,0.15);color:rgb(255,100,100)}
.plist{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
.pc{background:rgba(255,255,255,0.03);border:1px solid rgba(223,255,154,0.09);border-radius:13px;padding:10px 13px;display:flex;align-items:center;gap:10px;transition:all 0.25s;animation:sIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both}
@keyframes sIn{from{opacity:0;transform:translateX(-14px) scale(0.97)}to{opacity:1;transform:translateX(0)}}
.prank{width:26px;height:26px;background:rgba(0,0,0,0.3);border:1px solid rgba(223,255,154,0.12);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#DFFF9A;flex-shrink:0}
.pav{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#3b6d11,#013220);border:2px solid rgba(223,255,154,0.18);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#DFFF9A;flex-shrink:0}
.pav.custom{background:linear-gradient(135deg,#1a4a6b,#0a2040);border-color:rgba(100,180,255,0.25)}
.pname{flex:1;font-size:14px;font-weight:600;color:#f0f8e8}
.ptag{font-size:9px;color:rgba(100,200,255,0.5);font-family:'Sarabun',sans-serif;margin-left:3px}
.ptime{font-size:10px;color:rgba(223,255,154,0.35);font-family:'Sarabun',sans-serif;white-space:nowrap}
.xbtn{width:24px;height:24px;background:rgba(255,60,60,0.06);border:1px solid rgba(255,60,60,0.12);border-radius:6px;color:rgba(255,80,80,0.5);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all 0.2s;flex-shrink:0}
.xbtn:hover{background:rgba(255,60,60,0.16);color:rgb(255,80,80)}
.empty{text-align:center;padding:28px 20px;color:rgba(223,255,154,0.3);font-family:'Sarabun',sans-serif;font-size:12px}
.shuttle-anim{font-size:36px;display:block;margin-bottom:8px;animation:bob 2.5s ease-in-out infinite}
@keyframes bob{0%,100%{transform:rotate(-10deg)}50%{transform:translateY(-7px) rotate(10deg)}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:rgba(5,20,10,0.97);border:1px solid rgba(223,255,154,0.18);border-radius:11px;padding:9px 18px;font-size:12px;font-weight:700;color:#DFFF9A;z-index:999;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.footer{text-align:center;font-size:10px;color:rgba(223,255,154,0.18);letter-spacing:2px;text-transform:uppercase;font-family:'Sarabun',sans-serif}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="app">
  <div class="badge"><span class="dot"></span>FRIDAY NIGHT LIVE</div>
  <h1>Thananon<br>Badminton Night</h1>

  <div class="loc-bar">
    <div class="loc-display">
      <span class="pin">📍</span>
      <span>SS Sport Center</span>
    </div>
    <div class="time-badge">🕗 20.00–22.00</div>
  </div>

  <!-- Real-time sync indicator -->
  <div class="sync-bar">
    <div class="sync-left">
      <div class="sync-dot"></div>
      <span id="syncStatus">กำลังซิงค์...</span>
    </div>
    <span class="sync-right" onclick="manualSync()">🔄 รีเฟรช</span>
  </div>

  <div class="stats">
    <div class="sc"><div class="sn" id="st-join">0</div><div class="sl">เข้าร่วม</div></div>
    <div class="sc"><div class="sn" id="st-court">–</div><div class="sl">คอร์ทที่ใช้</div></div>
    <div class="sc"><div class="sn" id="st-left">24</div><div class="sl">ยังไม่มา</div></div>
  </div>

  <div class="panel">
    <div class="plbl">ตั้งค่าคอร์ท</div>
    <div class="court-row">
      <label>จำนวนคอร์ท</label>
      <input type="number" id="courtInput" min="1" max="10" value="2" oninput="updateCourts()">
      <div class="court-vis" id="courtVis"></div>
    </div>
    <div class="cap-txt" id="capTxt"></div>
  </div>

  <div class="panel">
    <div class="plbl">เข้าร่วมปาร์ตี้</div>
    <div class="sel-wrap">
      <select id="playerSel" onchange="onSelChange()">
        <option value="">— เลือกชื่อของคุณ —</option>
      </select>
    </div>
    <div class="divider">— หรือเพิ่มชื่อใหม่ —</div>
    <div class="add-custom">
      <input type="text" id="customName" placeholder="พิมพ์ชื่อของคุณ..." maxlength="16" oninput="onCustomInput()">
      <button onclick="addCustom()">+ เพิ่ม</button>
    </div>
    <button class="join-btn" id="joinBtn" disabled onclick="joinPlayer()">🏸 JOIN เข้าร่วม</button>
  </div>

  <div class="lh">
    <div class="lt">รายชื่อนักแบด <span id="liveCount" style="color:#c8ff4d"></span></div>
    <button class="rbtn" onclick="resetAll()">↺ รีเซ็ต</button>
  </div>
  <div class="plist" id="plist"></div>
  <div class="footer">THANANON BADMINTON · SS SPORT CENTER · REAL-TIME SYNC</div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ===== CONFIG ===== */
/* 
  ข้อมูลถูกเก็บใน JSONBin.io — free shared JSON storage
  สร้าง bin ฟรีได้ที่ https://jsonbin.io 
  แล้วเปลี่ยน BIN_ID และ API_KEY ด้านล่าง
  
  *** วิธีตั้งค่า (ทำครั้งเดียว ~2 นาที) ***
  1. ไปที่ https://jsonbin.io → Sign up ฟรี
  2. Dashboard → Create Bin → ใส่ {} → Create
  3. คัดลอก Bin ID จาก URL หรือ response
  4. My Account → API Keys → คัดลอก Secret Key
  5. แก้ BIN_ID และ API_KEY ด้านล่าง
*/
const BIN_ID = 'YOUR_BIN_ID_HERE';
const API_KEY = 'YOUR_API_KEY_HERE';
const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

/* ===== FALLBACK: localStorage ถ้ายังไม่ได้ตั้ง JSONBin ===== */
const USE_JSONBIN = BIN_ID !== 'YOUR_BIN_ID_HERE';

/* ===== DATA ===== */
const POOL = ["เฟ้น","บีม","กบ","โบว์","พี่แอม","ฟิล์ม","กู้","ปาม1","ปาม2","พี่เบลล์","เฮง","ปอป1","ปอป2","ตี๋","บ๊วย","แอ๊ม","กบ2","บอส","น้ำ","มี่","แมน","มุก","แต๊ง","ตาว"];
const INI = n => {const c=n.replace(/[0-9พี่น้อง]/g,'').replace(/\s/g,'');return c.slice(0,2)||n.slice(0,2)||'BD'};

let state = {
  attendees: [],
  times: {},
  customs: [],
  courts: 2
};
let lastSyncTime = null;
let syncInterval = null;
let isSyncing = false;

/* ===== JSONBIN API ===== */
async function fetchState() {
  if (!USE_JSONBIN) return loadLocal();
  try {
    const res = await fetch(API_URL + '/latest', {
      headers: {'X-Master-Key': API_KEY}
    });
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    return data.record || getDefaultState();
  } catch(e) {
    console.error('Fetch error:', e);
    return null;
  }
}

async function pushState(newState) {
  if (!USE_JSONBIN) {saveLocal(newState);return true}
  try {
    const res = await fetch(API_URL, {
      method: 'PUT',
      headers: {'Content-Type':'application/json','X-Master-Key': API_KEY},
      body: JSON.stringify(newState)
    });
    return res.ok;
  } catch(e) {
    console.error('Push error:', e);
    return false;
  }
}

function getDefaultState() {
  return {attendees:[],times:{},customs:[],courts:2};
}

/* ===== LOCAL FALLBACK ===== */
function loadLocal() {
  return {
    attendees: JSON.parse(localStorage.getItem('tb_att')||'[]'),
    times: JSON.parse(localStorage.getItem('tb_tm')||'{}'),
    customs: JSON.parse(localStorage.getItem('tb_cust')||'[]'),
    courts: parseInt(localStorage.getItem('tb_courts')||'2')
  };
}
function saveLocal(s) {
  localStorage.setItem('tb_att', JSON.stringify(s.attendees));
  localStorage.setItem('tb_tm', JSON.stringify(s.times));
  localStorage.setItem('tb_cust', JSON.stringify(s.customs));
  localStorage.setItem('tb_courts', String(s.courts));
}

/* ===== SYNC ===== */
async function syncFromServer() {
  if (isSyncing) return;
  isSyncing = true;
  const fresh = await fetchState();
  isSyncing = false;
  if (fresh) {
    const changed = JSON.stringify(fresh) !== JSON.stringify(state);
    state = fresh;
    lastSyncTime = new Date();
    updateSyncStatus();
    if (changed) renderAll();
  }
}

function updateSyncStatus() {
  const el = document.getElementById('syncStatus');
  if (!lastSyncTime) {el.textContent='กำลังเชื่อมต่อ...';return}
  const sec = Math.round((Date.now()-lastSyncTime)/1000);
  if (!USE_JSONBIN) {
    el.textContent = '⚠️ โหมด Local (ตั้งค่า JSONBin เพื่อ sync)';
    document.querySelector('.sync-dot').style.background='#ffaa00';
  } else {
    el.textContent = sec < 5 ? 'ซิงค์แล้ว ✓' : `อัปเดต ${sec} วิที่แล้ว`;
    document.querySelector('.sync-dot').style.background='#4dff88';
  }
}

function manualSync() {
  syncFromServer();
  toast('🔄 กำลังรีเฟรช...');
}

/* ===== COURT ===== */
function updateCourts() {
  const v = Math.max(1,Math.min(10,parseInt(document.getElementById('courtInput').value)||1));
  state.courts = v;
  pushState(state);
  renderCourtVis();
  renderStats();
}

function renderCourtVis() {
  const vis = document.getElementById('courtVis');
  vis.innerHTML='';
  for(let i=1;i<=state.courts;i++){
    const cnt = Math.max(0,Math.min(4,state.attendees.length-(i-1)*4));
    const d = document.createElement('div');
    d.className='cv'+(cnt>=4?' full':cnt>0?' on':'');
    d.textContent='C'+i+(cnt>0?'·'+cnt:'');
    vis.appendChild(d);
  }
  document.getElementById('capTxt').textContent='รองรับ '+(state.courts*4)+' คน · 4 คน/คอร์ท';
  document.getElementById('courtInput').value = state.courts;
}

function renderStats() {
  const n = state.attendees.length;
  document.getElementById('st-join').textContent = n;
  document.getElementById('st-court').textContent = n>0?Math.ceil(n/4)+'/'+state.courts:'–';
  const allPool = [...POOL,...state.customs];
  document.getElementById('st-left').textContent = allPool.filter(m=>!state.attendees.includes(m)).length;
  document.getElementById('liveCount').textContent = n>0?'('+n+')':'';
}

/* ===== SELECT ===== */
function buildSelect() {
  const sel = document.getElementById('playerSel');
  const allPool = [...POOL,...state.customs];
  const rem = allPool.filter(m=>!state.attendees.includes(m));
  sel.innerHTML='<option value="">— เลือกชื่อของคุณ —</option>';
  const og = rem.filter(m=>POOL.includes(m));
  if(og.length){
    const g=document.createElement('optgroup');g.label='รายชื่อ';
    og.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;g.appendChild(o)});
    sel.appendChild(g);
  }
  const cg2 = state.customs.filter(m=>!state.attendees.includes(m));
  if(cg2.length){
    const g=document.createElement('optgroup');g.label='เพิ่มใหม่';
    cg2.forEach(m=>{const o=document.createElement('option');o.value='__c__'+m;o.textContent=m+' (ใหม่)';g.appendChild(o)});
    sel.appendChild(g);
  }
  document.getElementById('joinBtn').disabled=true;
  document.getElementById('customName').value='';
}

function onSelChange(){
  const v=document.getElementById('playerSel').value;
  document.getElementById('joinBtn').disabled=!v;
  if(v)document.getElementById('customName').value='';
}
function onCustomInput(){
  const v=document.getElementById('customName').value.trim();
  if(v)document.getElementById('playerSel').value='';
  document.getElementById('joinBtn').disabled=!v&&!document.getElementById('playerSel').value;
}

/* ===== JOIN / REMOVE ===== */
async function addCustom(){
  const n=document.getElementById('customName').value.trim();
  if(!n)return;
  if([...POOL,...state.customs].some(m=>m===n)){toast('⚠️ มีชื่อนี้แล้ว');return}
  state.customs.push(n);
  await pushState(state);
  buildSelect();
  document.getElementById('playerSel').value='__c__'+n;
  document.getElementById('joinBtn').disabled=false;
  document.getElementById('customName').value='';
  toast('✅ เพิ่ม "'+n+'" เรียบร้อย');
}

async function joinPlayer(){
  let raw=document.getElementById('playerSel').value;
  const cInput=document.getElementById('customName').value.trim();
  let name='',isCustom=false;
  if(cInput){name=cInput;isCustom=true}
  else if(raw.startsWith('__c__')){name=raw.replace('__c__','');isCustom=true}
  else{name=raw}
  if(!name||state.attendees.includes(name))return;
  if(isCustom&&!state.customs.includes(name))state.customs.push(name);
  state.attendees.push(name);
  const now=new Date();
  state.times[name]=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  const ok=await pushState(state);
  renderAll();
  toast(ok?'✅ '+name+' เข้าร่วมแล้ว!':'✅ บันทึกแล้ว (offline)');
}

async function removePlayer(name){
  state.attendees=state.attendees.filter(m=>m!==name);
  delete state.times[name];
  await pushState(state);
  renderAll();
  toast('❌ '+name+' ออก');
}

async function resetAll(){
  if(!confirm('รีเซ็ตรายชื่อทั้งหมด?'))return;
  state.attendees=[];state.times={};
  await pushState(state);
  renderAll();
  toast('🔄 รีเซ็ตแล้ว');
}

/* ===== LIST ===== */
function renderList(){
  const list=document.getElementById('plist');list.innerHTML='';
  if(!state.attendees.length){
    list.innerHTML='<div class="empty"><span class="shuttle-anim">🏸</span>ยังไม่มีผู้เล่น — กด JOIN ก่อนเลย!</div>';
    return;
  }
  state.attendees.forEach((name,i)=>{
    const isC=!POOL.includes(name);
    const d=document.createElement('div');
    d.className='pc';d.style.animationDelay=(i*0.04)+'s';
    const xbtn=document.createElement('button');
    xbtn.className='xbtn';xbtn.textContent='✕';
    xbtn.onclick=()=>removePlayer(name);
    d.innerHTML=`<div class="prank">${i+1}</div><div class="pav${isC?' custom':''}">${INI(name).toUpperCase()}</div><div class="pname">${name}${isC?'<span class="ptag">ใหม่</span>':''}</div><div class="ptime">${state.times[name]||'–'}</div>`;
    d.appendChild(xbtn);
    list.appendChild(d);
  });
}

function renderAll(){renderList();renderStats();renderCourtVis();buildSelect()}

/* ===== TOAST ===== */
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);
}

/* ===== CANVAS BG ===== */
const canvas=document.getElementById('bg-canvas');
const ctx=canvas.getContext('2d');
const shuttles=[];const racketCards=[];

function resize(){
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  racketCards.length=0;
  const cols=Math.ceil(canvas.width/120)+1;
  const rows=Math.ceil(canvas.height/140)+1;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)
    racketCards.push({x:c*120+(r%2)*60,y:r*140,angle:(Math.random()-0.5)*0.3,alpha:0.04+Math.random()*0.04});
  if(!shuttles.length)for(let i=0;i<14;i++)shuttles.push(makeShuttle());
}

function makeShuttle(){
  return{x:Math.random()*canvas.width,y:-30-Math.random()*200,vy:0.8+Math.random()*1.2,vx:(Math.random()-0.5)*0.4,rot:Math.random()*Math.PI*2,vrot:(Math.random()-0.5)*0.04,size:14+Math.random()*10,alpha:0.15+Math.random()*0.25};
}
function drawRacket(x,y,w,h,alpha,angle){
  ctx.save();ctx.translate(x+w/2,y+h/2);ctx.rotate(angle);ctx.globalAlpha=alpha;
  ctx.strokeStyle='#DFFF9A';ctx.lineWidth=1;
  const hw=w*0.38,hh=h*0.3;
  ctx.beginPath();ctx.ellipse(0,-h*0.1,hw,hh,0,0,Math.PI*2);ctx.stroke();
  for(let i=-3;i<=3;i++){const yy=-h*0.1+i*(hh/3.5);const hw2=Math.sqrt(Math.max(0,1-(yy+h*0.1)**2/hh**2))*hw;if(hw2>2){ctx.beginPath();ctx.moveTo(-hw2,yy);ctx.lineTo(hw2,yy);ctx.stroke()}}
  for(let i=-3;i<=3;i++){const xx=i*(hw/3.5);const hh2=Math.sqrt(Math.max(0,1-xx**2/hw**2))*hh;if(hh2>2){ctx.beginPath();ctx.moveTo(xx,-h*0.1-hh2);ctx.lineTo(xx,-h*0.1+hh2);ctx.stroke()}}
  ctx.beginPath();ctx.moveTo(-hw*0.35,h*0.2);ctx.lineTo(-w*0.15,h*0.38);ctx.moveTo(hw*0.35,h*0.2);ctx.lineTo(w*0.15,h*0.38);ctx.stroke();
  ctx.lineWidth=3;ctx.strokeStyle='#7dbd1e';ctx.beginPath();ctx.moveTo(0,h*0.38);ctx.lineTo(0,h*0.48);ctx.stroke();
  ctx.restore();
}
function drawShuttle(x,y,size,rot,alpha){
  ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.globalAlpha=alpha;
  ctx.fillStyle='#DFFF9A';ctx.beginPath();ctx.ellipse(0,size*0.55,size*0.22,size*0.18,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(223,255,154,0.7)';ctx.lineWidth=0.8;
  for(let i=0;i<12;i++){const a=(i/11)*Math.PI-Math.PI/2;ctx.beginPath();ctx.moveTo(0,size*0.45);ctx.lineTo(Math.cos(a)*size*0.9,Math.sin(a)*size*0.63-size*0.1);ctx.stroke()}
  ctx.restore();
}
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  racketCards.forEach(rc=>drawRacket(rc.x,rc.y,90,110,rc.alpha,rc.angle));
  shuttles.forEach((s,i)=>{
    s.y+=s.vy;s.x+=s.vx;s.rot+=s.vrot;
    if(s.y>canvas.height+40){shuttles[i]=makeShuttle();shuttles[i].x=Math.random()*canvas.width}
    drawShuttle(s.x,s.y,s.size,s.rot,s.alpha);
  });
  requestAnimationFrame(animate);
}

/* ===== INIT ===== */
async function init(){
  resize();animate();
  updateSyncStatus();
  const fresh = await fetchState();
  if(fresh){state=fresh;lastSyncTime=new Date()}
  renderAll();
  updateSyncStatus();
  syncInterval = setInterval(syncFromServer, 4000);
  setInterval(updateSyncStatus, 1000);
}

window.addEventListener('resize',()=>{clearTimeout(window._rt);window._rt=setTimeout(resize,150)});
init();
</script>
